<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Carrinho de Compras - MotoVibe</title>
    <link href="carrinho.css" rel="stylesheet">
</head>
<body>

<h1>Seu Carrinho 🛒</h1>

<div id="carrinho-container"></div>

<div class="total" id="total"></div>

<div class="botoes">
    <a href="telainicial.html" class="voltar">← Continuar comprando</a>
    <button class="limpar-btn" onclick="limparCarrinho()">🗑️ Limpar Carrinho</button>
     <a href="Financiamento.html2.html" class="btn-financiamento">📊 Simular Financiamento</a>
    <button class="comprar-btn" id="btn-comprar" onclick="comprar()">💳 Comprar</button>
</div>

<script>
  let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    const container = document.getElementById('carrinho-container');
    const totalSpan = document.getElementById('total');

    function formatarPreco(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderizarCarrinho() {
        container.innerHTML = '';
        let total = 0;

        if (carrinho.length === 0) {
            container.innerHTML = "<p>Seu carrinho está vazio.</p>";
            totalSpan.textContent = "";
            return;
        }

        carrinho.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';

            const precoUnitario = item.preco;
            const precoTotal = precoUnitario * item.quantidade;

            div.innerHTML = `
                <div class="item-info">
                    <div><span>${item.nome}</span></div>
                    <div>Quantidade: ${item.quantidade}</div>
                    <div>Preço unitário: ${formatarPreco(precoUnitario)}</div>
                </div>
                <div>
                    <div><strong>${formatarPreco(precoTotal)}</strong></div>
                    <button class="remover-btn" onclick="removerItem(${index})">Remover</button>
                </div>
            `;
            container.appendChild(div);
            total += precoTotal;
        });

        totalSpan.textContent = `Total: ${formatarPreco(total)}`;
    }

    function removerItem(index) {
        if (confirm("Deseja remover esta moto do carrinho?")) {
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            renderizarCarrinho();
        }
    }

    function limparCarrinho() {
        if (confirm("Tem certeza que deseja limpar todo o carrinho?")) {
            carrinho = [];
            localStorage.removeItem('carrinho');
            renderizarCarrinho();
        }
    }

    function comprar() {
        window.location.href = "finalizar.html";
    }

    renderizarCarrinho();
</script>

</body>
</html>
